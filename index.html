<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4글자 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #fbfaf9;   /* 크림 배경 */
    --stone: #f2f0ed;    /* 헤어라인/보조면 */
    --sand: #f6f4ef;     /* 보조 버튼면 */
    --white: #ffffff;
    --ink: #121212;      /* 제목/기본 액션 */
    --charcoal: #343433; /* 소제목 */
    --brown: #474645;    /* 본문 */
    --muted: #7e7e7d;    /* 보조 텍스트 */
    --blue: #0086fc;
    --ember: #ff3e00;
    --green: #00c978;
    --honey: #ffbb26;
    --pink: #ff58ae;
    --red: #ff2b3a;
    --sans: 'Inter', 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--sans);
    background: var(--canvas); color: var(--brown); min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 60px; }
  h1 {
    text-align: center; color: var(--ink); margin: 8px 0 4px;
    font-size: clamp(40px, 9vw, 60px); font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.1;
  }
  .sub { text-align: center; color: var(--muted); margin: 0 0 28px; font-size: 14px; }
  .card { background: transparent; padding: 4px 0; margin-bottom: 8px; }
  .hidden { display: none !important; }

  button {
    font-family: var(--sans); font-size: 17px; font-weight: 600; padding: 13px 20px;
    border: none; border-radius: 9999px; cursor: pointer;
    background: var(--ink); color: var(--canvas);
    transition: transform .05s, filter .15s; width: 100%; margin-top: 10px;
  }
  button:hover { filter: brightness(1.6); }
  button:active { transform: scale(.98); }
  button.ghost { background: var(--sand); color: var(--ink); box-shadow: inset 0 0 0 1px var(--stone); }
  button.warn { background: var(--red); color: #fff; }
  button.gray { background: var(--sand); color: var(--brown); box-shadow: inset 0 0 0 1px var(--stone); }
  button.sm { font-size: 15px; padding: 10px 16px; width: auto; }

  input {
    font-family: var(--sans); font-size: 17px; padding: 13px 14px;
    border: none; box-shadow: inset 0 0 0 1px var(--stone); border-radius: 10px;
    width: 100%; margin-top: 8px; background: var(--white); color: var(--ink);
  }
  input:focus { outline: none; box-shadow: inset 0 0 0 2px var(--blue); }
  label { font-weight: 600; font-size: 15px; color: var(--charcoal); display: block; margin-top: 12px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .row > * { flex: 1; }

  .clue { text-align: center; padding: 16px 4px; }
  .tiles { display: flex; gap: 12px; justify-content: center; padding: 8px 0; }
  .tile {
    width: 82px; height: 96px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 700; line-height: 1;
  }
  .tile.fill { background: var(--white); color: var(--ink); box-shadow: inset 0 0 0 1px var(--stone); }
  .tile.blank { background: var(--stone); color: var(--muted); }
  @media (max-width: 480px) {
    .tile { width: 62px; height: 76px; font-size: 38px; }
    .tiles { gap: 8px; }
  }

  .badge {
    display: inline-block; background: var(--sand); color: var(--charcoal);
    padding: 6px 14px; border-radius: 9999px; font-size: 13px; font-weight: 600;
    box-shadow: inset 0 0 0 1px var(--stone);
  }
  .result-ok { color: var(--green); font-weight: 700; font-size: 26px; text-align: center; }
  .result-no { color: var(--red); font-weight: 700; font-size: 26px; text-align: center; }
  .score-big { font-size: 56px; font-weight: 700; text-align: center; color: var(--ink); line-height: 1; letter-spacing: -0.02em; }
  .roomcode { font-size: clamp(44px, 11vw, 60px); font-weight: 700; letter-spacing: 2px; color: var(--ink); text-align: center; }

  /* 순위표 = 흰 카드 + 헤어라인 */
  table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 8px; }
  td { padding: 14px; text-align: left; font-size: 17px; color: var(--charcoal); background: var(--white); box-shadow: inset 0 0 0 1px var(--stone); }
  td:first-child { border-radius: 10px 0 0 10px; font-weight: 700; width: 60px; }
  td:last-child { border-radius: 0 10px 10px 0; text-align: right; font-weight: 700; }
  .rank1 td { background: var(--honey); color: var(--ink); box-shadow: none; }
  .rank2 td { background: var(--sand); }
  .rank3 td { background: #ffe7f3; }
  .medal { font-weight: 700; }

  .note { font-size: 13px; color: var(--muted); text-align: center; margin-top: 8px; }
  .qr { display: block; margin: 14px auto; background: var(--white); padding: 10px; border-radius: 12px; box-shadow: inset 0 0 0 1px var(--stone); }
  .linkbox { word-break: break-all; font-size: 13px; background: var(--sand); color: var(--brown); padding: 10px 12px; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--stone); }
  .err { color: var(--red); font-size: 15px; margin-top: 8px; min-height: 18px; text-align: center; }
  .players { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip { background: var(--sand); color: var(--charcoal); padding: 8px 12px; border-radius: 9999px; font-size: 14px; box-shadow: inset 0 0 0 1px var(--stone); }

  /* 강사 화면 2단 배치 */
  h3 { color: var(--ink); font-weight: 700; letter-spacing: -0.01em; }
  .tcols { display: flex; gap: 16px; align-items: flex-start; margin-top: 12px; }
  .tmain { flex: 2; min-width: 0; }
  .tside { flex: 1; min-width: 180px; background: var(--white); border-radius: 12px; padding: 16px; box-shadow: inset 0 0 0 1px var(--stone); }
  .tside h3 { margin: 2px 0 8px; font-size: 20px; }
  .tside .players { display: block; margin-top: 0; }
  .prow { display: flex; justify-content: space-between; align-items: center; padding: 11px 4px; border-bottom: 1px solid var(--stone); font-size: 16px; color: var(--charcoal); }
  .prow:last-child { border-bottom: none; }
  .prow b { color: var(--ember); font-weight: 700; }
  @media (max-width: 640px) { .tcols { flex-direction: column; } .tside { width: 100%; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>4글자 퀴즈</h1>
  <p class="sub">실시간 교실 게임 · 소리가 안 나면 화면을 한 번 클릭/터치해 주세요.</p>

  <!-- ================= 첫 화면 ================= -->
  <div id="home" class="card">
    <button id="btnGoStudent">학생으로 입장</button>
  </div>

  <!-- ================= 강사 화면 ================= -->
  <div id="teacher" class="card hidden">
    <!-- 로그인 -->
    <div id="teacherLogin">
      <button id="btnCreateRoom">방 만들기</button>
      <div class="err" id="teacherErr"></div>
    </div>

    <!-- 운영 -->
    <div id="teacherPanel" class="hidden">
      <div class="badge" id="tGameStatus">대기 중</div>
      <div class="tcols">
        <!-- 왼쪽: 대기 / 진행 / 결과 -->
        <div class="tmain">
          <!-- 대기 화면 (시작 전) -->
          <div id="tLobby">
            <div class="roomcode" id="tRoomCode">----</div>
            <div class="note">학생 입장 링크</div>
            <div class="linkbox" id="tLink"></div>
            <img class="qr" id="tQR" width="180" height="180" alt="QR">
            <label>몇 문제를 낼까요? (전체 <span id="tBankCount">0</span>문제 중, 랜덤 출제)</label>
            <input id="tNumQ" type="number" min="1" value="20">
            <button id="btnStart">게임 시작</button>
          </div>

          <!-- 진행 화면 (시작 후) -->
          <div id="tPlay" class="hidden">
            <div class="note" id="tRoomCodeSmall"></div>
            <div class="note" id="tProgress"></div>
            <div class="clue" id="tClue"></div>
            <button id="btnNext">다음 문제</button>
            <div class="row">
              <button id="btnForceEnd" class="sm warn">강제 종료</button>
              <button id="btnEditScore" class="sm gray">점수 수정</button>
            </div>
            <button id="btnReset" class="sm warn">초기화 (모두 퇴장)</button>
          </div>

          <!-- 결과 화면 -->
          <div id="tRankingWrap" class="hidden">
            <h3>최종 순위 (상위 3등)</h3>
            <div id="tRanking"></div>
            <button id="btnReset3" class="warn">초기화 (새 게임)</button>
          </div>
        </div>

        <!-- 오른쪽: 참가자 목록 -->
        <div class="tside">
          <h3>참가자 <span id="tCount">0</span>명</h3>
          <div class="players" id="tPlayers"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= 학생 화면 ================= -->
  <div id="student" class="card hidden">
    <!-- 입장 -->
    <div id="studentJoin">
      <label>방 코드</label>
      <input id="sRoom" inputmode="numeric" placeholder="방 코드 입력 후 Enter">
      <label>닉네임</label>
      <input id="sNick" placeholder="닉네임 입력 후 Enter" maxlength="20">
      <button id="btnJoin">입장하기</button>
      <div class="err" id="studentErr"></div>
    </div>

    <!-- 게임 -->
    <div id="studentGame" class="hidden">
      <div class="badge" id="sStatus">대기 중</div>
      <div class="note">내 점수</div>
      <div class="score-big" id="sScore">0</div>
      <div class="note" id="sProgress"></div>

      <div class="clue" id="sClue">강사가 게임을 시작하면 문제가 나옵니다.</div>

      <div class="note">앞 2글자를 보고, 이어지는 뒤 2글자를 입력하세요.</div>
      <div id="sAnswerBox" class="hidden">
        <input id="sAnswer" placeholder="뒤 2글자 입력 후 Enter" maxlength="4">
        <button id="btnSubmit">제출</button>
      </div>
      <div id="sResult" class="err"></div>

      <div id="sRankingWrap" class="hidden">
        <h3>최종 순위 (상위 3등)</h3>
        <div id="sRanking"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
/* ================================================================
   여기에 Firebase 2단계에서 복사한 firebaseConfig 를 붙여넣으세요 (아래 값 교체)
   (이 값은 공개돼도 되는 값입니다)
================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAubt_ZOBVgU_u0VX-61SBkPs0wKOq8oGw",
  authDomain: "four-word-quiz-v1.firebaseapp.com",
  databaseURL: "https://four-word-quiz-v1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "four-word-quiz-v1",
  storageBucket: "four-word-quiz-v1.firebasestorage.app",
  messagingSenderId: "551656050149",
  appId: "1:551656050149:web:33f8359ea046c035d8f30c"
};
/* =============================================================== */

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* ---------- 효과음 (Web Audio, 외부 파일 불필요) ---------- */
let actx;
function beep(freq, dur, type = "sine", vol = 0.2) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    g.gain.value = vol; o.start();
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.stop(actx.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  click:   () => beep(600, 0.05),
  correct: () => { beep(880, 0.12); setTimeout(() => beep(1320, 0.15), 100); },
  wrong:   () => beep(160, 0.3, "sawtooth"),
  start:   () => { beep(523, 0.1); setTimeout(() => beep(784, 0.15), 120); },
  end:     () => { beep(392, 0.2); setTimeout(() => beep(262, 0.3), 200); },
  fanfare: () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.25), i * 150))
};
document.body.addEventListener("click", () => { if (actx && actx.state === "suspended") actx.resume(); });

/* ---------- 공통 유틸 ---------- */
const $ = id => document.getElementById(id);
function show(id) { $(id).classList.remove("hidden"); }
function hide(id) { $(id).classList.add("hidden"); }
const statusText = s => ({ waiting: "대기 중", playing: "진행 중", paused: "잠시 멈춤", finished: "게임 종료" }[s] || s);

// 한글(IME) 입력 중에도 Enter 한 번에 실행되도록: 조합이 끝난 뒤(다음 틱) 실행
function onEnter(el, fn) {
  el.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.keyCode === 13) { e.preventDefault(); setTimeout(fn, 0); }
  });
}

let authReady = new Promise(resolve => {
  auth.onAuthStateChanged(u => { if (u) resolve(u); });
  auth.signInAnonymously().catch(e => alert("로그인 오류: " + e.message));
});
async function myToken() { return auth.currentUser.getIdToken(); }
async function prefixOf(index) {
  const snap = await db.ref("questionBank/fourWordQuiz/questions/" + index + "/prefix").get();
  return snap.exists() ? snap.val() : "(문제 없음)";
}
// 4글자 타일: 앞 2글자(채움) + 뒤 2글자(입력값 또는 ?)
function tilesHtml(prefix, typed) {
  typed = typed || "";
  const p = String(prefix || "").split("");
  const t = typed.split("");
  const cells = [
    { c: p[0] || "", fill: true },
    { c: p[1] || "", fill: true },
    { c: t[0] || "?", fill: !!t[0] },
    { c: t[1] || "?", fill: !!t[1] },
  ];
  return '<div class="tiles">' + cells.map(x =>
    '<div class="tile ' + (x.fill ? "fill" : "blank") + '">' + escapeHtml(x.c) + "</div>"
  ).join("") + "</div>";
}

/* ================= 화면 전환 ================= */
$("btnGoStudent").onclick = () => { sfx.click(); hide("home"); show("student"); $("sRoom").focus(); };

/* URL 분기: ?mode=admin 이면 강사 화면(비밀번호 없음), ?room=코드 면 학생 화면 */
(function () {
  const p = new URLSearchParams(location.search);
  if (p.get("mode") === "admin") { hide("home"); show("teacher"); return; }
  const r = p.get("room");
  if (r) { hide("home"); show("student"); $("sRoom").value = r; setTimeout(() => $("sNick").focus(), 100); }
})();

/* ================================================================
   강사(Teacher)
================================================================ */
let hostRoom = null, hostBankCount = 0;

$("btnCreateRoom").onclick = async () => {
  sfx.click();
  $("teacherErr").textContent = "";
  try {
    await authReady;
    const res = await fetch("/api/create-room", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idToken: await myToken() })
    });
    const data = await res.json();
    if (!res.ok) { $("teacherErr").textContent = data.error || "오류"; return; }
    hostRoom = data.roomCode;
    startTeacherPanel(data.roomCode, data.bankCount);
  } catch (e) {
    $("teacherErr").textContent = "네트워크 오류: " + e.message;
  }
};

function startTeacherPanel(code, bankCount) {
  hide("teacherLogin"); show("teacherPanel");
  hostBankCount = bankCount || 0;
  $("tRoomCode").textContent = code;
  $("tRoomCodeSmall").textContent = "방 코드: " + code;
  $("tBankCount").textContent = hostBankCount;
  $("tNumQ").value = Math.min(20, hostBankCount || 20);
  const link = location.origin + "/?room=" + code;
  $("tLink").textContent = link;
  $("tQR").src = "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(link);

  const roomRef = db.ref("rooms/" + code);

  // 참가자 목록 + 점수 (오른쪽, 점수순 세로 리스트)
  roomRef.child("players").on("value", snap => {
    const players = snap.val() || {};
    const arr = Object.entries(players);
    $("tCount").textContent = arr.length;
    $("tPlayers").innerHTML = arr.length
      ? arr.sort((a, b) => (b[1].score || 0) - (a[1].score || 0))
          .map(([uid, p]) => `<div class="prow"><span>${escapeHtml(p.nickname)}</span><b>${p.score || 0}점</b></div>`).join("")
      : '<div class="note">아직 참가자가 없습니다.</div>';
  });

  // 상태에 따라 대기/진행/결과 화면 전환
  roomRef.child("gameStatus").on("value", s => {
    const st = s.val();
    $("tGameStatus").textContent = statusText(st);
    hide("tLobby"); hide("tPlay"); hide("tRankingWrap");
    if (st === "finished") show("tRankingWrap");
    else if (st === "playing") show("tPlay");   // 시작하면 QR 대기화면 사라짐
    else show("tLobby");
  });

  // 현재 문제 (랜덤 순서 order 사용)
  roomRef.child("currentIndex").on("value", async s => {
    const pos = s.val();
    if (pos === null || pos < 0) { $("tClue").innerHTML = ""; $("tProgress").textContent = ""; return; }
    const [orderSnap, totalSnap] = await Promise.all([roomRef.child("order").get(), roomRef.child("totalQuestions").get()]);
    const order = orderSnap.val() || [];
    const total = totalSnap.val() || order.length;
    $("tProgress").textContent = `문제 ${pos + 1} / ${total}`;
    $("tClue").innerHTML = tilesHtml(await prefixOf(order[pos]), "");
  });

  roomRef.child("ranking").on("value", s => {
    const r = s.val();
    if (!r) return;
    $("tRanking").innerHTML = renderRanking(r);
    sfx.fanfare();
  });
}

// 강사 버튼들
async function hostSet(obj) { await db.ref("rooms/" + hostRoom).update(obj); }

$("btnStart").onclick = async () => {
  let n = parseInt($("tNumQ").value, 10);
  if (!n || n < 1) { alert("문제 수를 숫자로 입력하세요."); return; }
  n = Math.min(n, hostBankCount);
  // 전체 문제 인덱스를 섞어서 앞에서 n개 선택 (랜덤 출제)
  const arr = Array.from({ length: hostBankCount }, (_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
  const order = arr.slice(0, n);
  try {
    await db.ref("rooms/" + hostRoom + "/ranking").remove();
    await hostSet({ order, totalQuestions: n, currentIndex: 0, gameStatus: "playing" });
    sfx.start();
  } catch (e) {
    alert("게임 시작 실패: " + e.message + "\n\nFirebase 보안 규칙(Rules)을 최신 내용으로 다시 게시했는지 확인해 주세요.");
  }
};
$("btnNext").onclick = async () => {
  sfx.click();
  const snap = await db.ref("rooms/" + hostRoom).get();
  const room = snap.val() || {};
  const next = (room.currentIndex ?? -1) + 1;
  if (next >= (room.totalQuestions || 0)) { await finalize(); }
  else { await hostSet({ currentIndex: next }); }
};
$("btnForceEnd").onclick = async () => { sfx.click(); if (confirm("게임을 종료하고 순위를 발표할까요?")) await finalize(); };

async function doReset() {
  if (!confirm("초기화하면 학생 전원 퇴장 + 모든 기록이 삭제됩니다. 진행할까요?")) return;
  const base = db.ref("rooms/" + hostRoom);
  await base.child("players").remove();
  await base.child("ranking").remove();
  await base.child("order").remove();
  await db.ref("submissions/" + hostRoom).remove();
  await hostSet({ gameStatus: "waiting", currentIndex: -1, totalQuestions: 0 });
}
$("btnReset").onclick = () => { sfx.click(); doReset(); };
$("btnReset3").onclick = () => { sfx.click(); doReset(); };

$("btnEditScore").onclick = async () => {
  sfx.click();
  const snap = await db.ref("rooms/" + hostRoom + "/players").get();
  const players = snap.val() || {};
  const list = Object.entries(players).map(([uid, p], i) => `${i + 1}. ${p.nickname} (${p.score || 0}점)`).join("\n");
  const arr = Object.entries(players);
  if (!arr.length) { alert("참가자가 없습니다."); return; }
  const pick = prompt("점수를 수정할 학생 번호를 입력하세요:\n\n" + list);
  const n = parseInt(pick, 10);
  if (!n || n < 1 || n > arr.length) return;
  const [uid, p] = arr[n - 1];
  const val = prompt(`${p.nickname} 님의 새 점수:`, p.score || 0);
  const newScore = parseInt(val, 10);
  if (isNaN(newScore)) return;
  await db.ref("rooms/" + hostRoom + "/players/" + uid + "/score").set(newScore);
};

async function finalize() {
  const snap = await db.ref("rooms/" + hostRoom + "/players").get();
  const players = snap.val() || {};
  const sorted = Object.entries(players)
    .map(([uid, p]) => ({ uid, nickname: p.nickname, score: p.score || 0, joinedAt: p.joinedAt || 0 }))
    .sort((a, b) => b.score - a.score || a.joinedAt - b.joinedAt);
  const ranking = {};
  if (sorted[0]) ranking.first = sorted[0];
  if (sorted[1]) ranking.second = sorted[1];
  if (sorted[2]) ranking.third = sorted[2];
  await db.ref("rooms/" + hostRoom + "/ranking").set(ranking);
  await hostSet({ gameStatus: "finished" });
  sfx.end();
}

/* ================================================================
   학생(Student)
================================================================ */
let myRoom = null, myUid = null, myIndex = -1, answeredIndex = -1, curPrefix = "", curStatus = "waiting";

// 답 입력창 표시 여부를 한 곳에서 결정 (비동기 경쟁 방지)
function refreshAnswerBox() {
  if (curStatus === "playing" && myIndex >= 0 && answeredIndex !== myIndex) show("sAnswerBox");
  else hide("sAnswerBox");
}

onEnter($("sRoom"), () => $("sNick").focus());
onEnter($("sNick"), () => $("btnJoin").click());

$("btnJoin").onclick = async () => {
  sfx.click();
  const room = $("sRoom").value.trim();
  const nick = $("sNick").value.trim();
  $("studentErr").textContent = "";
  if (!room || !nick) { $("studentErr").textContent = "방 코드와 닉네임을 모두 입력하세요."; return; }
  try {
    await authReady;
    myUid = auth.currentUser.uid;
    const roomSnap = await db.ref("rooms/" + room).get();
    if (!roomSnap.exists()) { $("studentErr").textContent = "존재하지 않는 방 코드입니다."; return; }
    myRoom = room;
    await db.ref("rooms/" + room + "/players/" + myUid).set({
      nickname: nick, score: 0,
      joinedAt: firebase.database.ServerValue.TIMESTAMP,
      lastActiveAt: firebase.database.ServerValue.TIMESTAMP
    });
    startStudentGame();
  } catch (e) {
    $("studentErr").textContent = "입장 오류: " + e.message;
  }
};

function startStudentGame() {
  hide("studentJoin"); show("studentGame");
  const roomRef = db.ref("rooms/" + myRoom);

  // 내 점수
  roomRef.child("players/" + myUid + "/score").on("value", s => { $("sScore").textContent = s.val() ?? 0; });

  // 초기화되어 내가 퇴장 처리되면 다시 입장 화면으로
  roomRef.child("players/" + myUid).on("value", s => {
    if (!s.exists()) { alert("강사가 게임을 초기화했습니다. 다시 입장해 주세요."); location.reload(); }
  });

  // 상태
  roomRef.child("gameStatus").on("value", s => {
    curStatus = s.val();
    $("sStatus").textContent = statusText(curStatus);
    refreshAnswerBox();
  });

  // 현재 문제 (랜덤 순서 order 사용)
  roomRef.child("currentIndex").on("value", async s => {
    const pos = s.val();
    myIndex = (pos ?? -1);
    if (myIndex < 0) { $("sClue").textContent = "강사가 게임을 시작하면 문제가 나옵니다."; $("sProgress").textContent = ""; refreshAnswerBox(); return; }
    const [orderSnap, totalSnap] = await Promise.all([
      roomRef.child("order").get(), roomRef.child("totalQuestions").get()
    ]);
    const order = orderSnap.val() || [];
    const total = totalSnap.val() || order.length;
    $("sProgress").textContent = `문제 ${myIndex + 1} / ${total}`;
    curPrefix = await prefixOf(order[myIndex]);
    $("sClue").innerHTML = tilesHtml(curPrefix, "");
    $("sResult").textContent = "";
    $("sAnswer").value = "";
    refreshAnswerBox();
    if (curStatus === "playing" && answeredIndex !== myIndex) $("sAnswer").focus();
  });

  // 최종 순위
  roomRef.child("ranking").on("value", s => {
    const r = s.val();
    if (!r) { hide("sRankingWrap"); return; }
    show("sRankingWrap");
    $("sRanking").innerHTML = renderRanking(r);
    hide("sAnswerBox");
    sfx.fanfare();
  });
}

onEnter($("sAnswer"), () => $("btnSubmit").click());
$("sAnswer").addEventListener("input", () => {
  if (myIndex >= 0) $("sClue").innerHTML = tilesHtml(curPrefix, $("sAnswer").value.trim());
});

$("btnSubmit").onclick = async () => {
  const answer = $("sAnswer").value.trim();
  if (!answer) return;
  if (answeredIndex === myIndex) { $("sResult").textContent = "이미 제출했습니다."; return; }
  hide("sAnswerBox");
  try {
    const res = await fetch("/api/submit-answer", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ roomCode: myRoom, index: myIndex, answer, idToken: await myToken() })
    });
    const data = await res.json();
    if (!res.ok) {
      $("sResult").textContent = data.error || "제출 오류";
      if (!data.already) show("sAnswerBox");
      return;
    }
    answeredIndex = myIndex;
    if (data.correct) { sfx.correct(); $("sResult").innerHTML = '<div class="result-ok">정답입니다 (+1) &mdash; ' + escapeHtml(curPrefix + answer) + '</div>'; }
    else { sfx.wrong(); $("sResult").innerHTML = '<div class="result-no">오답입니다</div>'; }
  } catch (e) {
    $("sResult").textContent = "네트워크 오류: " + e.message;
    show("sAnswerBox");
  }
};

/* ================= 공통 렌더 ================= */
function renderRanking(r) {
  const rows = [["1위", "rank1", r.first], ["2위", "rank2", r.second], ["3위", "rank3", r.third]]
    .filter(x => x[2])
    .map(([m, cls, p]) => `<tr class="${cls}"><td class="medal">${m}</td><td>${escapeHtml(p.nickname)}</td><td>${p.score}점</td></tr>`)
    .join("");
  return `<table>${rows}</table>`;
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
